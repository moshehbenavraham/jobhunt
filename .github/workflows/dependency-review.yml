name: Dependency Review
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        # TODO: remove continue-on-error once the dependency graph is enabled in
        # Settings > Security & Analysis. Until then, this is a temporary
        # workaround to avoid noisy failures when dependency graph data is
        # unavailable. fail-on-severity: high remains configured, but it will
        # not block while continue-on-error is true.
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
